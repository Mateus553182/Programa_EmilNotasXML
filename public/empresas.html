<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2f3742" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/styles.css?v=20260525b" />
    <title>Emil Notas XML - Empresas</title>
  </head>
  <body>
    <nav class="navbar">
      <div class="navbar-inner">
        <a class="navbar-brand" href="/dashboard">
          <img src="/logo-emil-nova.png" alt="Emil" />
          NotasXML
        </a>

        <button class="navbar-toggle" id="navbarToggle" aria-label="Menu">&#9776;</button>

        <div class="navbar-menu" id="navbarMenu">
          <div class="nav-item" data-dropdown>
            <button class="nav-link">Ferramentas <span class="caret">&#9660;</span></button>
            <div class="nav-dropdown"></div>
          </div>

          <div class="nav-item" data-dropdown>
            <button class="nav-link" style="color:#fff;">Cadastramento <span class="caret">&#9660;</span></button>
            <div class="nav-dropdown">
              <a href="/empresas">Empresas</a>
              <hr />
              <span class="dropdown-disabled">Usuarios (em breve)</span>
            </div>
          </div>

          <div class="nav-item" data-dropdown>
            <button class="nav-link">Movimentar <span class="caret">&#9660;</span></button>
            <div class="nav-dropdown">
              <a href="/documentos-fiscais">Documentos Fiscais</a>
            </div>
          </div>

          <div class="nav-item" data-dropdown>
            <button class="nav-link">Relatorios <span class="caret">&#9660;</span></button>
            <div class="nav-dropdown"></div>
          </div>
        </div>

        <div class="navbar-right">
          <div class="nav-item" data-dropdown>
            <button class="nav-user-btn nav-link" id="navUserLabel">Ola!</button>
            <div class="nav-dropdown" style="right:0;left:auto;">
              <a href="/alterar-senha">Alterar senha</a>
            </div>
          </div>
          <button class="nav-logout-btn" data-nav-logout>Sair</button>
        </div>
      </div>
    </nav>

    <main class="container">
      <section class="card">
        <div class="table-header">
          <div>
            <h2>Empresas</h2>
            <p class="subtitle-auth" id="planUsageHint">Carregando...</p>
          </div>
        </div>

        <div class="companies-search-bar">
          <input id="companySearchInput" type="search" placeholder="&#128269; Pesquisar empresa..." />
        </div>

        <div class="table-wrap">
          <table id="companiesTable">
            <thead>
              <tr>
                <th class="col-actions" colspan="2"></th>
                <th>Codigo</th>
                <th>Razao social</th>
                <th>CNPJ</th>
                <th>Cidade/UF</th>
              </tr>
            </thead>
            <tbody id="companiesBody">
              <tr><td colspan="6">Carregando...</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <!-- FAB button -->
    <button id="fabAddCompany" class="fab-btn" title="Adicionar empresa">+</button>

    <!-- Modal: criar / editar empresa -->
    <div id="companyModal" class="company-modal-backdrop hidden">
      <div class="company-modal company-form-modal card">
        <div class="company-modal-header">
          <h2 id="companyModalTitle">Nova empresa</h2>
          <button id="closeCompanyModalBtn" type="button" class="close-x company-close-x">&times;</button>
        </div>

        <div class="company-modal-body">
          <!-- Certificado atual (mostrado ao editar) -->
          <div id="currentCertSection" class="cert-section" style="display:none;">
            <h3 class="cert-section-title">Certificado atual</h3>
            <p id="currentCertInfo" style="margin:0;padding:0.5rem 0;font-size:0.95rem;"></p>
          </div>

          <!-- Certificado digital (obrigatório) -->
          <div class="cert-section" id="certSection">
            <h3 class="cert-section-title">Certificado digital</h3>
            <div class="certificado-upload modal-cert-upload">
              <div class="upload-area upload-area-sm" id="certUploadArea">
                <span class="upload-icon">&#128274;</span>
                <p>Clique ou arraste o .pfx / .p12</p>
                <input id="certFileInput" type="file" accept=".pfx,.p12" />
              </div>
              <p id="certFileName" class="certificado-file-name"></p>
              <div class="form-grid cert-grid">
                <label for="certPasswordInput">Senha:</label>
                <div class="inline-actions">
                  <input id="certPasswordInput" type="password" placeholder="Senha do certificado" />
                  <button id="certExtractBtn" type="button" class="secondary">Extrair</button>
                </div>
                <label for="certValidadeInput">Validade:</label>
                <input id="certValidadeInput" type="date" readonly />
              </div>
              <p id="certMessage" class="message"></p>
            </div>
          </div>

          <!-- Dados da empresa -->
          <form id="companyForm" class="form-grid company-grid-form">
            <label for="companyNameInput">Razao social:</label>
            <input id="companyNameInput" type="text" placeholder="Nome da empresa" required />

            <label for="companyCnpjInput">CNPJ:</label>
            <input id="companyCnpjInput" type="text" placeholder="00.000.000/0000-00" maxlength="18" required />

            <label for="companyCepInput">CEP:</label>
            <input id="companyCepInput" type="text" placeholder="00000-000" maxlength="9" />

            <label for="companyStreetInput">Endereco:</label>
            <input id="companyStreetInput" type="text" placeholder="Rua, numero, bairro" />

            <label for="companyCityInput">Cidade:</label>
            <input id="companyCityInput" type="text" placeholder="Cidade" />

            <label for="companyStateInput">Estado:</label>
            <input id="companyStateInput" type="text" placeholder="UF" maxlength="2" />
          </form>
          <p id="companyFormMessage" class="message"></p>
        </div>

        <div class="company-modal-actions">
          <button id="cancelCompanyModalBtn" type="button" class="secondary">Cancelar</button>
          <button id="saveCompanyBtn" type="button">Salvar</button>
        </div>
      </div>
    </div>

    <script src="/empresas.js?v=59"></script>
    <script src="/navbar.js"></script>
  </body>
</html>
